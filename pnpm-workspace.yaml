allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
overrides:
  "@astrojs/cloudflare>astro": "$astro"
  "@astrojs/cloudflare>vite": "$vite"
  "astro-compress>astro": "$astro"
  "astro-html-minifier-next>astro": "$astro"
  "astro>vite": "$vite"
packageExtensions:
  astro-compress:
    dependencies:
      astro: "-"
    peerDependencies:
      astro: "*"
